name: CI & Publish

on:
  push:
    branches:
      - main
      - docs
      - develop
      - config
      - application
      - domain
      - presentation
  pull_request:
    branches:
      - main
      - develop
      - "release/*"

env:
  NODE_VERSION: "24.9.0"

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Install docs dependencies
        working-directory: ./docs
        run: vp install

      - name: Run checks
        run: vp check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run TypeScript compiler
        run: vp exec tsc -p tsconfig.json --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run tests
        run: vp test run

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install docs dependencies
        working-directory: ./docs
        run: vp install

      - name: Typecheck documentation
        working-directory: ./docs
        run: vp run typecheck

      - name: Build documentation
        working-directory: ./docs
        run: vp run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: ./docs/dist/
          if-no-files-found: error
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, test, build-docs]
    if: always() && needs.lint-and-format.result == 'success' && needs.type-check.result == 'success' && needs.test.result == 'success' && (needs.build-docs.result == 'success' || needs.build-docs.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build project
        run: vp build

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: stats/
          if-no-files-found: warn
          retention-days: 30

  publish-npm:
    name: Publish to npm (main only)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref_name == 'main' && github.repository_owner == 'UlloaSP'
    permissions:
      contents: write
      id-token: write
    outputs:
      package_version: ${{ steps.version_check.outputs.current_version }}
      published: ${{ steps.publish.outcome == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change from npm registry
        id: version_check
        shell: bash
        run: |
          set -eo pipefail
          node <<'NODE'
          const https = require('https');
          const fs = require('fs');

          const outputPath = process.env.GITHUB_OUTPUT;
          const currentVersion = require('./package.json').version;
          const packageName = require('./package.json').name;

          const fetchNpmVersion = () =>
            new Promise((resolve) => {
              https
                .get(`https://registry.npmjs.org/${packageName}/latest`, (res) => {
                  let data = '';
                  res.on('data', (chunk) => {
                    data += chunk;
                  });
                  res.on('end', () => {
                    try {
                      const json = JSON.parse(data);
                      resolve(json.version || '');
                    } catch {
                      resolve('');
                    }
                  });
                })
                .on('error', () => resolve(''));
            });

          (async () => {
            const registryVersion = await fetchNpmVersion();
            const changed = registryVersion !== currentVersion;

            fs.appendFileSync(outputPath, `current_version=${currentVersion}\n`, 'utf8');
            fs.appendFileSync(outputPath, `registry_version=${registryVersion}\n`, 'utf8');
            fs.appendFileSync(outputPath, `version_changed=${changed}\n`, 'utf8');

            if (!changed) {
              console.log(`No version change detected: ${currentVersion} (registry: ${registryVersion || 'not found'})`);
            } else {
              console.log(`Version change detected: ${registryVersion || 'not found'} -> ${currentVersion}`);
            }
          })();
          NODE

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
        if: steps.version_check.outputs.version_changed == 'true'

      - name: Install dependencies
        run: vp install
        if: steps.version_check.outputs.version_changed == 'true'

      - name: Build for publication
        run: vp build
        if: steps.version_check.outputs.version_changed == 'true'

      - name: Publish to npm
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: vp pm publish --provenance --access public
        if: steps.version_check.outputs.version_changed == 'true'

      - name: Skip publish
        if: steps.version_check.outputs.version_changed != 'true'
        run: echo "Skipping publish; package version ${{ steps.version_check.outputs.current_version }} unchanged."

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm]
    if: needs.publish-npm.outputs.published == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build package
        run: vp build

      - name: Create package tarball
        run: vp pack

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish-npm.outputs.package_version }}
          name: Release v${{ needs.publish-npm.outputs.package_version }}
          generate_release_notes: true
          files: |
            *.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy Documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-docs]
    if: success()
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: ./docs/dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
